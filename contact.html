<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>LifeQuest | Contact</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header id="site-header">
<h1 class="site-title">LifeQuest</h1>
</header>

<nav id="main-navigation">
<ul class="nav-menu">

<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

</ul>
</nav>

<main id="contact-main">

<section id="contact-section" class="content-section">

<h2 class="section-title">Contact Us</h2>

<form id="contact-form" class="form-container">

<div class="form-group">

<label for="name">Full Name:</label>
<input type="text" id="name" name="name" required>

</div>

<div class="form-group">

<label for="email">Email Address:</label>
<input type="email" id="email" name="email" required>

</div>

<div class="form-group">

<p class="form-label">User Type:</p>

<input type="radio" id="student" name="user-type" value="student">
<label for="student">Student</label>

<input type="radio" id="professional" name="user-type" value="professional">
<label for="professional">Professional</label>

</div>

<div class="form-group">

<label for="message">Message:</label>
<textarea id="message" name="message" rows="5"></textarea>

</div>

<div class="form-group">

<button type="submit" class="submit-button">Submit</button>

</div>

</form>

</section>

</main>

<footer id="site-footer">
<p class="footer-text">© 2026 LifeQuest</p>
</footer>

</body>
</html>
