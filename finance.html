<main class="main">

<h1>Finance Manager</h1>

<div class="card">
<form id="finance-form">
<label for="month">Month</label>
<input type="text" id="month" required>

<label for="income">Income</label>
<input type="number" id="income" required>

<label for="expense-desc">Expense Description</label>
<input type="text" id="expense-desc" required>

<label for="amount">Amount</label>
<input type="number" id="amount" required>

<button type="submit">Add Record</button>
</form>
</div>

<div class="card">
<ul id="finance-list"></ul>
</div>

</main>

</div>

<script>
const form = document.getElementById("finance-form");
const list = document.getElementById("finance-list");

function loadFinance() {
  const records = JSON.parse(localStorage.getItem("finance")) || [];
  list.innerHTML = "";

  records.forEach(record => {
    const li = document.createElement("li");
    li.textContent = `${record.month} | Income: $${record.income} | ${record.desc}: $${record.amount}`;
    list.appendChild(li);
  });
}

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const month = document.getElementById("month").value;
  const income = document.getElementById("income").value;
  const desc = document.getElementById("expense-desc").value;
  const amount = document.getElementById("amount").value;

  const records = JSON.parse(localStorage.getItem("finance")) || [];
  records.push({ month, income, desc, amount });

  localStorage.setItem("finance", JSON.stringify(records));

  form.reset();
  loadFinance();
});

loadFinance();
</script>

<script src="js/app.js"></script>
</body>
