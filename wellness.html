<main class="main">

<h1>Wellness</h1>

<div class="card">
<form id="wellness-form">
<label for="water">Water Intake</label>
<input type="number" id="water" required>

<label for="sleep">Sleep Hours</label>
<input type="number" id="sleep" required>

<button type="submit">Log</button>
</form>
</div>

<div class="card">
<h2>Previous Entries</h2>
<ul id="wellness-list"></ul>
</div>

</main>

</div>

<script>
const form = document.getElementById("wellness-form");
const list = document.getElementById("wellness-list");

function loadWellness() {
  const entries = JSON.parse(localStorage.getItem("wellness")) || [];
  list.innerHTML = "";

  entries.forEach(entry => {
    const li = document.createElement("li");
    li.textContent = `Water: ${entry.water} | Sleep: ${entry.sleep}`;
    list.appendChild(li);
  });
}

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const water = document.getElementById("water").value;
  const sleep = document.getElementById("sleep").value;

  const entries = JSON.parse(localStorage.getItem("wellness")) || [];
  entries.push({ water, sleep });

  localStorage.setItem("wellness", JSON.stringify(entries));

  form.reset();
  loadWellness();
});

loadWellness();
</script>

<script src="js/app.js"></script>
