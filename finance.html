<div class="main">
<h1>Finance Manager</h1>

<p>
Track your monthly income and expenses to better manage your finances. 
View your financial history from oldest to newest to understand your spending habits.
</p>

<div class="card">

<form id="finance-form">

<label for="month">Month</label>
<input type="text" id="month" placeholder="e.g. January" required>

<label for="income">Income</label>
<input type="number" id="income" required>

<label for="expense">Expense Description</label>
<input type="text" id="expense-desc" required>

<label for="amount">Expense Amount</label>
<input type="number" id="amount" required>

<button type="submit">Add Record</button>

</form>

</div>

<div class="card">
<h2>Financial Records</h2>
<ul id="finance-list"></ul>
</div>

</div>
