<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
  <h2>LifeQuest</h2>
  <a href="dashboard.html">Overview</a>
  <a href="finance.html">Finance</a>
  <a href="wellness.html">Wellness</a>
  <a href="focus.html">Focus</a>
  <a href="rewards.html">Rewards</a>
  <a href="journal.html">Journal</a>
  <a href="contact.html">Contact</a>
  <a href="account.html">Account</a>
</div>

<div class="main">

<h1>User Account</h1>

<div class="card profile-section">
  <img src="https://via.placeholder.com/120" class="avatar" id="avatar-img">
  <p><strong>Name:</strong> <span id="display-name">Guest</span></p>
</div>

<div class="card">
<h2>Update Profile</h2>

<form id="account-form">

<label for="username">Name</label>
<input type="text" id="username">

<label for="avatar">Upload Avatar</label>
<input type="file" id="avatar" accept="image/*">

<button type="submit">Save Changes</button>

</form>
</div>

</div>

<script>
const form = document.getElementById("account-form");
const usernameInput = document.getElementById("username");
const avatarInput = document.getElementById("avatar");
const avatarImg = document.getElementById("avatar-img");
const displayName = document.getElementById("display-name");

function loadProfile() {
  const name = localStorage.getItem("username");
  const avatar = localStorage.getItem("avatar");

  if (name) {
    usernameInput.value = name;
    displayName.textContent = name;
  }

  if (avatar) {
    avatarImg.src = avatar;
  }
}

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const name = usernameInput.value;
  localStorage.setItem("username", name);
  displayName.textContent = name;

  const file = avatarInput.files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = function() {
      localStorage.setItem("avatar", reader.result);
      avatarImg.src = reader.result;
    };

    reader.readAsDataURL(file);
  }

  alert("Profile saved!");
});

loadProfile();
</script>

<script src="js/app.js"></script>
</body>
</html>
